services:
  - type: web
    name: whatsapp-service
    runtime: docker
    rootDir: whatsapp-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SERVICE_URL
        sync: false
    healthCheckPath: /api/health
    plan: starter
